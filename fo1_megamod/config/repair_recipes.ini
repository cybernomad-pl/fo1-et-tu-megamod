[AmmoConversion]
; Format: source_pid,target_pid,skill_required,tool_required
; PID reference (Fallout 1):
;   24=10mm JHP, 25=10mm AP
;   26=.44 Magnum JHP, 27=.44 FMJ
;   28=14mm AP
;   29=5mm JHP, 30=5mm AP
;   31=.223 FMJ
;   32=Shotgun Shells
;   33=Flamer Fuel
;   34=Micro Fusion Cell
;   35=Small Energy Cell
;   36=Rocket
;   37=Explosive Rocket

; 10mm JHP -> 10mm AP (need pliers, Repair 40%)
recipe_1=24,25,40,1
; 10mm AP -> 10mm JHP
recipe_2=25,24,30,1
; 5mm JHP -> 5mm AP (Repair 50%)
recipe_3=29,30,50,1
; 5mm AP -> 5mm JHP
recipe_4=30,29,40,1
; .44 Magnum JHP -> .44 FMJ (Repair 45%)
recipe_5=26,27,45,1
; .44 FMJ -> .44 Magnum JHP
recipe_6=27,26,35,1
; Rocket -> Explosive Rocket (Repair 75%, rare conversion)
recipe_7=36,37,75,1
; Conversion ratio: how many source rounds per 1 target round
; Higher skill = better ratio
base_ratio=3
skilled_ratio=2
expert_ratio=1
; Skill thresholds for ratio tiers
skilled_threshold=80
expert_threshold=120
